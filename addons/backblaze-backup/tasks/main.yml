---
# Backblaze B2 Backup Addon — multi-job sync

- name: Install required packages
  ansible.builtin.pacman:
    name:
      - rclone
      - jq
    state: present

- name: Create backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ backup_staging_path }}"
    - "{{ backup_log_path }}"
    - "{{ backup_config_path }}"
    - "/root/.config/rclone"

# ── Auto-configure rclone for B2 ────────────────────────────

- name: Check if rclone B2 remote is configured
  ansible.builtin.shell: rclone config show {{ rclone_config_name }} 2>/dev/null | grep -q 'type'
  register: rclone_configured
  changed_when: false
  failed_when: false

- name: Configure rclone for Backblaze B2
  ansible.builtin.shell: |
    rclone config create {{ rclone_config_name }} b2 \
      account "{{ backup_b2_key_id }}" \
      key "{{ backup_b2_app_key }}"
  when: rclone_configured.rc != 0 and backup_b2_key_id | length > 0
  no_log: true

- name: Test rclone B2 connectivity
  ansible.builtin.command:
    cmd: "rclone lsd {{ rclone_config_name }}:"
  register: rclone_test
  changed_when: false
  failed_when: false

- name: Show rclone status
  ansible.builtin.debug:
    msg: "rclone B2: {{ 'Connected' if rclone_test.rc == 0 else 'NOT connected — check credentials' }}"

# ── Deploy scripts ──────────────────────────────────────────

- name: Deploy backup script
  ansible.builtin.template:
    src: b2-backup.sh.j2
    dest: "{{ backup_script_path }}"
    mode: '0755'
    owner: root
    group: root

- name: Deploy systemd service
  ansible.builtin.template:
    src: server-backup.service.j2
    dest: "/etc/systemd/system/{{ backup_service_name }}.service"
    mode: '0644'

- name: Deploy systemd timer
  ansible.builtin.template:
    src: server-backup.timer.j2
    dest: "/etc/systemd/system/{{ backup_timer_name }}"
    mode: '0644'

- name: Deploy logrotate configuration
  ansible.builtin.template:
    src: backup-logrotate.j2
    dest: "/etc/logrotate.d/server-backup"
    mode: '0644'

- name: Enable and start backup timer
  ansible.builtin.systemd:
    name: "{{ backup_timer_name }}"
    state: started
    enabled: true
    daemon_reload: true

# ── Verify and restore scripts ──────────────────────────────

- name: Deploy backup verify script
  ansible.builtin.template:
    src: backup-verify.sh.j2
    dest: "/usr/local/bin/backup-verify"
    mode: '0755'

- name: Deploy backup restore script
  ansible.builtin.template:
    src: backup-restore.sh.j2
    dest: "/usr/local/bin/backup-restore"
    mode: '0755'

- name: Deploy backup monitor script
  ansible.builtin.template:
    src: backup-monitor.sh.j2
    dest: "/usr/local/bin/backup-monitor"
    mode: '0755'

- name: Deploy backup monitor systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/backup-monitor.service
    mode: '0644'
    content: |
      [Unit]
      Description=Backup monitoring check
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/backup-monitor

- name: Deploy backup monitor systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/backup-monitor.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Run backup monitor every 6 hours

      [Timer]
      OnCalendar=*-*-* 00/6:30:00
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Enable backup monitor timer
  ansible.builtin.systemd:
    name: backup-monitor.timer
    state: started
    enabled: true
    daemon_reload: true

# ── Summary ─────────────────────────────────────────────────

- name: Display backup setup information
  ansible.builtin.debug:
    msg:
      - "Backblaze B2 backup configured ({{ backup_jobs | length }} jobs)"
      - "  Jobs: {{ backup_jobs | map(attribute='name') | join(', ') }}"
      - ""
      - "Schedule: {{ backup_schedule }} ({{ backup_daily_schedule }})"
      - "B2 connectivity: {{ 'OK' if rclone_test.rc == 0 else 'FAILED' }}"
      - ""
      - "Commands:"
      - "  Manual backup: {{ backup_script_path }}"
      - "  Show status: {{ backup_script_path }} status"
      - "  Verify: backup-verify"
      - "  Restore: backup-restore --list"
      - "  Monitor: backup-monitor status"
