---
# cgit Addon - Main Tasks

- name: Install required packages
  ansible.builtin.pacman:
    name:
      - cgit
      - fcgiwrap
      - highlight
    state: present
  when: ansible_distribution == "Archlinux"

- name: Create git user
  ansible.builtin.user:
    name: "{{ cgit_fcgi_user }}"
    system: true
    shell: /usr/bin/git-shell
    home: "{{ cgit_repo_path }}"
    create_home: false

- name: Add git user to admin group (read access to vault repos)
  ansible.builtin.user:
    name: "{{ cgit_fcgi_user }}"
    groups: "{{ admin_user | default('admin') }}"
    append: true
  failed_when: false

- name: Create cgit directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ cgit_cache_path }}"
    - "{{ cgit_log_path }}"
    - "/run/cgit"

- name: Ensure git repositories directory exists (don't change ownership)
  ansible.builtin.file:
    path: "{{ cgit_repo_path }}"
    state: directory
    mode: '0755'

- name: Deploy cgit configuration
  ansible.builtin.template:
    src: cgitrc.j2
    dest: "{{ cgit_config_file }}"
    mode: '0644'
    owner: root
    group: root
  notify: restart fcgiwrap

- name: Deploy Caddy configuration for cgit (standalone, not via admin dashboard)
  ansible.builtin.template:
    src: cgit.caddy.j2
    dest: "{{ cgit_caddy_config }}"
    mode: '0644'
    owner: root
    group: root
  notify: reload caddy
  when: not (admin_dashboard_enabled | default(false) | bool)

- name: Deploy fcgiwrap systemd service
  ansible.builtin.template:
    src: fcgiwrap.service.j2
    dest: /etc/systemd/system/fcgiwrap.service
    mode: '0644'
    owner: root
    group: root

- name: Deploy fcgiwrap systemd socket
  ansible.builtin.template:
    src: fcgiwrap.socket.j2
    dest: /etc/systemd/system/fcgiwrap.socket
    mode: '0644'
    owner: root
    group: root

- name: Enable and start fcgiwrap socket
  ansible.builtin.systemd:
    name: fcgiwrap.socket
    state: started
    enabled: true
    daemon_reload: true

- name: Create cgit CSS file
  ansible.builtin.copy:
    content: |
      /* cgit default styling */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      
      #header {
        background-color: #f6f8fa;
        padding: 20px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      
      #header h1 {
        margin: 0;
        color: #24292e;
      }
      
      #content {
        background-color: #fff;
        padding: 20px;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
      }
      
      table.list {
        width: 100%;
        border-collapse: collapse;
      }
      
      table.list th,
      table.list td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid #e1e4e8;
      }
      
      table.list th {
        background-color: #f6f8fa;
        font-weight: 600;
      }
      
      a {
        color: #0366d6;
        text-decoration: none;
      }
      
      a:hover {
        text-decoration: underline;
      }
      
      .age {
        color: #586069;
        font-size: 0.9em;
      }
      
      .reposize {
        color: #586069;
        font-size: 0.9em;
      }
    dest: /usr/share/webapps/cgit/cgit.css
    mode: '0644'
    owner: root
    group: root

- name: Create repository scan script
  ansible.builtin.template:
    src: scan-repos.sh.j2
    dest: /usr/local/bin/scan-cgit-repos
    mode: '0755'
    owner: root
    group: root

- name: Deploy cgit scan systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/cgit-scan.service
    mode: '0644'
    content: |
      [Unit]
      Description=Scan cgit repositories
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/scan-cgit-repos

- name: Deploy cgit scan systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/cgit-scan.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Scan cgit repositories every 6 hours
      [Timer]
      OnCalendar=*-*-* 0/6:00:00
      Persistent=true
      [Install]
      WantedBy=timers.target

- name: Enable cgit scan timer
  ansible.builtin.systemd:
    name: cgit-scan.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Ensure repo directory is world-readable (for cgit scanning)
  ansible.builtin.shell: |
    find {{ cgit_repo_path }} -type d -exec chmod a+rx {} + 2>/dev/null
    find {{ cgit_repo_path }} -type f -exec chmod a+r {} + 2>/dev/null
  changed_when: false
  failed_when: false

- name: Create cgit health check endpoint
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # cgit health check
      
      if systemctl is-active fcgiwrap.socket &>/dev/null; then
          echo "cgit: OK"
          exit 0
      else
          echo "cgit: FAILED"
          exit 1
      fi
    dest: /usr/local/bin/cgit-health
    mode: '0755'
    owner: root
    group: root

- name: Display cgit setup information
  ansible.builtin.debug:
    msg:
      - "cgit addon configured successfully"
      - "Repository path: {{ cgit_repo_path }}"
      - "Web URL: http://localhost{{ cgit_url_prefix }}/"
      - "Configuration: {{ cgit_config_file }}"
      - ""
      - "Next steps:"
      - "1. Add git repositories to {{ cgit_repo_path }}"
      - "2. Run 'scan-cgit-repos' to update repository list"
      - "3. Access cgit at the URL above"
      - ""
      - "Repository format:"
      - "  - Create bare repositories: git init --bare repo.git"
      - "  - Add description: echo 'Repo description' > repo.git/description"
      - "  - Set default branch: echo 'main' > repo.git/HEAD"
