---
# Claude Code CLI - Anthropic's AI coding assistant
# https://docs.anthropic.com/en/docs/claude-code

- name: Ensure Node.js is installed
  community.general.pacman:
    name:
      - nodejs
      - npm
    state: present

- name: Check Node.js version
  ansible.builtin.command:
    cmd: node --version
  register: node_version
  changed_when: false

- name: Verify minimum Node.js version
  ansible.builtin.assert:
    that:
      - node_version.stdout | regex_replace('^v', '') is version(claude_cli_min_node_version, '>=')
    fail_msg: "Node.js {{ claude_cli_min_node_version }}+ required, found {{ node_version.stdout }}"

- name: Install Claude Code CLI
  ansible.builtin.command:
    cmd: "npm install -g {{ claude_cli_npm_package }}@{{ claude_cli_version }}"
  register: claude_install
  changed_when: "'added' in claude_install.stdout or 'updated' in claude_install.stdout"

- name: Verify Claude CLI is available
  ansible.builtin.command:
    cmd: claude --version
  register: claude_version
  changed_when: false
  failed_when: claude_version.rc != 0

- name: Create Claude config directory
  ansible.builtin.file:
    path: "{{ claude_cli_config_dir }}"
    state: directory
    mode: '0700'

- name: Check if API key is configured
  ansible.builtin.shell:
    cmd: "printenv {{ claude_cli_env_var }} 2>/dev/null || true"
  register: api_key_check
  changed_when: false

- name: Display setup information
  ansible.builtin.debug:
    msg:
      - "Claude Code CLI installed successfully"
      - "  Version: {{ claude_version.stdout }}"
      - "  Command: claude"
      - "  Config: {{ claude_cli_config_dir }}"
      - ""
      - "{{ 'API key: CONFIGURED' if api_key_check.stdout | length > 0 else 'NEXT STEP: Set your API key:' }}"
      - "{{ '' if api_key_check.stdout | length > 0 else '  export ANTHROPIC_API_KEY=\"your-key-here\"' }}"
      - "{{ '' if api_key_check.stdout | length > 0 else '  # Add to ~/.bashrc or ~/.zshrc for persistence' }}"
