---
# OpenAI Codex CLI - AI coding agent
# https://github.com/openai/codex

- name: Ensure Node.js is installed
  community.general.pacman:
    name:
      - nodejs
      - npm
    state: present

- name: Check Node.js version
  ansible.builtin.command:
    cmd: node --version
  register: node_version
  changed_when: false

- name: Verify minimum Node.js version
  ansible.builtin.assert:
    that:
      - node_version.stdout | regex_replace('^v', '') is version(codex_cli_min_node_version, '>=')
    fail_msg: "Node.js {{ codex_cli_min_node_version }}+ required, found {{ node_version.stdout }}"

- name: Install Codex CLI
  ansible.builtin.command:
    cmd: "npm install -g {{ codex_cli_npm_package }}@{{ codex_cli_version }}"
  register: codex_install
  changed_when: "'added' in codex_install.stdout or 'updated' in codex_install.stdout"

- name: Verify Codex CLI is available
  ansible.builtin.command:
    cmd: codex --version
  register: codex_version
  changed_when: false
  failed_when: false

- name: Create Codex config directory
  ansible.builtin.file:
    path: "{{ codex_cli_config_dir }}"
    state: directory
    mode: '0700'

- name: Check if API key is configured
  ansible.builtin.shell:
    cmd: "printenv {{ codex_cli_env_var }} 2>/dev/null || true"
  register: api_key_check
  changed_when: false

- name: Display setup information
  ansible.builtin.debug:
    msg:
      - "OpenAI Codex CLI installed successfully"
      - "  Version: {{ codex_version.stdout | default('unknown') }}"
      - "  Command: codex"
      - "  Config: {{ codex_cli_config_dir }}"
      - ""
      - "{{ 'API key: CONFIGURED' if api_key_check.stdout | length > 0 else 'NEXT STEP: Set your API key:' }}"
      - "{{ '' if api_key_check.stdout | length > 0 else '  export OPENAI_API_KEY=\"your-key-here\"' }}"
      - "{{ '' if api_key_check.stdout | length > 0 else '  # Add to ~/.bashrc or ~/.zshrc for persistence' }}"
