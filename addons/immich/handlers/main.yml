---
# Immich Addon - Handlers (Podman)

- name: restart immich
  ansible.builtin.shell: |
    podman-compose -f {{ immich_docker_compose_path }} down 2>/dev/null || true
    systemctl reset-failed 2>/dev/null || true
    podman-compose -f {{ immich_docker_compose_path }} up -d
  args:
    chdir: "{{ immich_data_path }}"

- name: reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded

- name: restart immich backup timer
  ansible.builtin.systemd:
    name: immich-backup.timer
    state: restarted
    daemon_reload: true
