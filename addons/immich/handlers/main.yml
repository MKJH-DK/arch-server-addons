---
# Immich Addon - Handlers (Podman)

- name: restart immich
  ansible.builtin.command:
    cmd: podman-compose -f {{ immich_docker_compose_path }} restart
    chdir: "{{ immich_data_path }}"

- name: reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded

- name: restart immich backup timer
  ansible.builtin.systemd:
    name: immich-backup.timer
    state: restarted
    daemon_reload: true
