---
# Immich Addon - Main Tasks (Podman)
#
# Uses Podman (rootful) with podman-compose instead of Docker.
# Compatible with hardened kernels that lack bridge/iptables modules.

# ── 1. Install Podman and dependencies ──────────────────────────────────────

- name: Install Podman and podman-compose
  ansible.builtin.pacman:
    name:
      - podman
      - cni-plugins
      - aardvark-dns
      - netavark
      - slirp4netns
    state: present

- name: Install podman-compose via pacman
  ansible.builtin.pacman:
    name: podman-compose
    state: present

- name: Enable and start Podman socket (for API compatibility)
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true

- name: Configure Podman for hardened kernel (disable default sysctls + hardening)
  ansible.builtin.copy:
    dest: /etc/containers/containers.conf
    content: |
      [containers]
      default_sysctls = []
      no_new_privileges = true
      default_capabilities = []
    mode: '0644'
    owner: root
    group: root

# ── 2. Create directories ──────────────────────────────────────────────────

- name: Create Immich directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ immich_data_path }}"
    - "{{ immich_db_data_path }}"
    - "{{ immich_redis_data_path }}"
    - "{{ immich_upload_path }}"
    - "{{ immich_library_path }}"
    - "{{ immich_thumb_path }}"
    - "{{ immich_profile_path }}"
    - "{{ immich_backup_path }}"

# ── 3. Generate credentials (reuse existing on subsequent deploys) ─────────

- name: Check for existing credentials file
  ansible.builtin.stat:
    path: "{{ immich_data_path }}/.credentials"
  register: immich_creds_file

- name: Read existing credentials
  ansible.builtin.shell: cat "{{ immich_data_path }}/.credentials"
  register: immich_existing_creds
  changed_when: false
  when: immich_creds_file.stat.exists

- name: Reuse existing DB password
  ansible.builtin.set_fact:
    immich_db_password: "{{ immich_existing_creds.stdout | regex_search('IMMICH_DB_PASSWORD=(.+)', '\\1') | first }}"
  when: vault_immich_db_password is not defined and immich_creds_file.stat.exists and immich_existing_creds.stdout is search('IMMICH_DB_PASSWORD=')

- name: Reuse existing admin password
  ansible.builtin.set_fact:
    immich_admin_password: "{{ immich_existing_creds.stdout | regex_search('IMMICH_ADMIN_PASSWORD=(.+)', '\\1') | first }}"
  when: vault_immich_admin_password is not defined and immich_creds_file.stat.exists and immich_existing_creds.stdout is search('IMMICH_ADMIN_PASSWORD=')

- name: Generate random DB password (first deploy only)
  ansible.builtin.set_fact:
    immich_db_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: vault_immich_db_password is not defined and not immich_creds_file.stat.exists

- name: Generate random admin password (first deploy only)
  ansible.builtin.set_fact:
    immich_admin_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: vault_immich_admin_password is not defined and not immich_creds_file.stat.exists

# ── 4. Deploy configuration files ──────────────────────────────────────────

- name: Deploy environment file
  ansible.builtin.template:
    src: docker.env.j2
    dest: "{{ immich_docker_env_path }}"
    mode: '0600'
    owner: root
    group: root
  notify: restart immich

- name: Deploy Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ immich_docker_compose_path }}"
    mode: '0644'
    owner: root
    group: root
  notify: restart immich

- name: Deploy Caddy configuration for Immich
  ansible.builtin.template:
    src: immich.caddy.j2
    dest: "{{ immich_caddy_config }}"
    mode: '0644'
    owner: root
    group: root
  notify: reload caddy

# ── 5. Start services (host networking — no bridge needed) ──────────────────

- name: Start Immich services with podman-compose
  ansible.builtin.command:
    cmd: podman-compose -f {{ immich_docker_compose_path }} up -d
    chdir: "{{ immich_data_path }}"
  register: immich_compose
  changed_when: "'Creating' in immich_compose.stdout or 'Starting' in immich_compose.stdout"

- name: Wait for Immich server to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ immich_server_port }}/api/server/ping"
    method: GET
    timeout: 60
  register: immich_health
  retries: 10
  delay: 10
  until: immich_health.status == 200
  failed_when: false

# ── 7. Deploy helper scripts ───────────────────────────────────────────────

- name: Create Immich admin user script
  ansible.builtin.template:
    src: create-admin.sh.j2
    dest: /usr/local/bin/immich-create-admin
    mode: '0755'
    owner: root
    group: root

- name: Create Immich backup script
  ansible.builtin.template:
    src: immich-backup.sh.j2
    dest: /usr/local/bin/immich-backup
    mode: '0755'
    owner: root
    group: root

- name: Create Immich restore script
  ansible.builtin.template:
    src: immich-restore.sh.j2
    dest: /usr/local/bin/immich-restore
    mode: '0755'
    owner: root
    group: root

# ── 8. Backup timer ────────────────────────────────────────────────────────

- name: Create systemd service for Immich backup
  ansible.builtin.template:
    src: immich-backup.service.j2
    dest: /etc/systemd/system/immich-backup.service
    mode: '0644'
    owner: root
    group: root

- name: Create systemd timer for Immich backup
  ansible.builtin.template:
    src: immich-backup.timer.j2
    dest: /etc/systemd/system/immich-backup.timer
    mode: '0644'
    owner: root
    group: root

- name: Enable and start Immich backup timer
  ansible.builtin.systemd:
    name: immich-backup.timer
    state: started
    enabled: true
  when: immich_backup_enabled | bool

# ── 9. Health check & logrotate ─────────────────────────────────────────────

- name: Create Immich health check script
  ansible.builtin.template:
    src: immich-health.sh.j2
    dest: /usr/local/bin/immich-health
    mode: '0755'
    owner: root
    group: root

- name: Create logrotate configuration for Immich
  ansible.builtin.template:
    src: immich-logrotate.j2
    dest: /etc/logrotate.d/immich
    mode: '0644'
    owner: root
    group: root

# ── 10. Store credentials ──────────────────────────────────────────────────

- name: Store generated passwords in secure file
  ansible.builtin.copy:
    content: |
      # Immich Generated Passwords
      # Generated on: {{ ansible_date_time.iso8601 }}

      IMMICH_DB_PASSWORD={{ immich_db_password }}
      IMMICH_ADMIN_PASSWORD={{ immich_admin_password }}
    dest: "{{ immich_data_path }}/.credentials"
    mode: '0600'
    owner: root
    group: root
  when: vault_immich_db_password is not defined or vault_immich_admin_password is not defined

# ── 11. Summary ─────────────────────────────────────────────────────────────

- name: Display Immich setup information
  ansible.builtin.debug:
    msg:
      - "Immich addon deployed successfully (Podman)"
      - "Data path: {{ immich_data_path }}"
      - "Web URL: http://localhost{{ immich_url_prefix }}/"
      - "{%- if immich_domain | length > 0 %}Domain URL: https://{{ immich_domain }}/{%- endif %}"
      - ""
      - "Admin credentials:"
      - "  Email: {{ immich_admin_email }}"
      - "  Password: {{ immich_admin_password if vault_immich_admin_password is not defined else '[stored in vault]' }}"
      - ""
      - "Database:"
      - "  Password: {{ immich_db_password if vault_immich_db_password is not defined else '[stored in vault]' }}"
      - ""
      - "Commands:"
      - "  Create admin: immich-create-admin"
      - "  Backup: immich-backup"
      - "  Restore: immich-restore"
      - "  Health check: immich-health"
      - ""
      - "Podman management:"
      - "  View logs: cd {{ immich_data_path }} && podman-compose logs -f"
      - "  Stop services: cd {{ immich_data_path }} && podman-compose down"
      - "  Start services: cd {{ immich_data_path }} && podman-compose up -d"
      - ""
      - "Credentials stored in: {{ immich_data_path }}/.credentials"
