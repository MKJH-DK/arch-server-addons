---
# Obsidian Web Addon - Default Variables
#
# Vault-strukturen bevares som den er fra Obsidian.
# Eneste tilføjelse er _public/ mappen hvorfra Quartz bygger websites.

# --- Paths ---

# Vault root — hele vaulten synces hertil via Syncthing.
# Struktur: 01-notes/, 02-knowledge/, 03-personal/, 04-repos/, 05-public/
# 05-public/ indeholder Quartz sites — hver mappe hedder det samme som URL'en.
obsidian_vault_path: /srv/vault

# Quartz static site generator installation
obsidian_quartz_path: /srv/quartz

# Per-site Quartz config files (én .ts per site)
obsidian_quartz_configs_path: /srv/quartz/configs

# Web root — byggede sites serves herfra
# Hver site får sin egen mappe: web_root/<site-name>/
obsidian_web_root: /var/www/sites

# --- Syncthing ---

# Bruger der ejer vault-filer og kører Syncthing
obsidian_syncthing_user: admin

# Syncthing admin port (kun localhost)
obsidian_syncthing_port: 8384

# Syncthing data (device keys, index, config)
obsidian_syncthing_data_path: /var/lib/syncthing

# --- Caddy ---

obsidian_caddy_config_path: /etc/caddy/conf.d/obsidian.caddy

# --- Build ---

# Hvor ofte Quartz rebuilder sites (minutter)
# Læser fra vault/_public/<site>/ → web_root/<site>/
obsidian_build_interval_minutes: 5

# --- Sites ---
#
# Hvert entry under 05-public/ der skal publiceres som website.
# Bygger fra:  vault/05-public/<name>/  →  web_root/<name>/
# Mappenavnet (name) SKAL matche domænet så URL og filsti er identiske.
#
# Felter:
#   name        - mappenavn under 05-public/ (= domænet)
#   title       - sidetitel i Quartz
#   description - meta description (SEO, RSS)
#   domain      - FQDN (identisk med name)
#
# Override i Ansible inventory for dit faktiske setup.
obsidian_sites:
  - name: mkjh.dk
    title: "MKJH"
    description: "Personlig hjemmeside og CV"
    domain: "mkjh.dk"

  - name: notes.mkjh.dk
    title: "Notes"
    description: "Offentlige noter og artikler"
    domain: "notes.mkjh.dk"
