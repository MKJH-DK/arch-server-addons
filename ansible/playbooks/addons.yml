---
- name: Deploy Arch Server Addons
  hosts: localhost
  connection: local
  become: yes
  vars:
    # Obsidian Web variables
    obsidian_enabled: "{{ obsidian_enabled | default(false) }}"
    obsidian_vault_path: "{{ obsidian_vault_path | default('/srv/vault') }}"
    obsidian_domain: "{{ obsidian_domain | default('') }}"
    obsidian_url_prefix: "{{ obsidian_url_prefix | default('/wiki') }}"
    obsidian_syncthing_user: "{{ obsidian_syncthing_user | default('admin') }}"
    obsidian_render_mode: "{{ obsidian_render_mode | default('quartz') }}"
    
    # Backblaze Backup variables
    backblaze_enabled: "{{ backblaze_enabled | default(false) }}"
    backup_b2_bucket: "{{ backup_b2_bucket | default('') }}"
    backup_schedule: "{{ backup_schedule | default('daily') }}"
    backup_retention_days: "{{ backup_retention_days | default(30) }}"
    backup_encrypt: "{{ backup_encrypt | default(true) }}"
    backup_paths: "{{ backup_paths | default(['/srv', '/etc/caddy']) }}"
    
    # cgit variables
    cgit_enabled: "{{ cgit_enabled | default(false) }}"
    cgit_title: "{{ cgit_title | default('My Git Repos') }}"
    cgit_repo_path: "{{ cgit_repo_path | default('/srv/git') }}"
    cgit_url_prefix: "{{ cgit_url_prefix | default('/git') }}"
    
    # Immich variables
    immich_enabled: "{{ immich_enabled | default(false) }}"
    immich_domain: "{{ immich_domain | default('') }}"
    immich_url_prefix: "{{ immich_url_prefix | default('/photos') }}"
    immich_data_path: "{{ immich_data_path | default('/srv/immich') }}"
    immich_admin_email: "{{ immich_admin_email | default('admin@example.com') }}"
    immich_version: "{{ immich_version | default('latest') }}"
    
    # CrowdSec variables
    crowdsec_enabled: "{{ crowdsec_enabled | default(false) }}"
    crowdsec_domain: "{{ crowdsec_domain | default('') }}"
    crowdsec_url_prefix: "{{ crowdsec_url_prefix | default('/security') }}"
    crowdsec_data_path: "{{ crowdsec_data_path | default('/srv/crowdsec') }}"
    crowdsec_config_path: "{{ crowdsec_config_path | default('/etc/crowdsec') }}"
    crowdsec_log_path: "{{ crowdsec_log_path | default('/var/log/crowdsec') }}"
    crowdsec_agent_port: "{{ crowdsec_agent_port | default(8080) }}"
    crowdsec_api_port: "{{ crowdsec_api_port | default(8081) }}"
    crowdsec_firewall_enabled: "{{ crowdsec_firewall_enabled | default(true) }}"
    crowdsec_caddy_enabled: "{{ crowdsec_caddy_enabled | default(true) }}"

    # Ollama variables
    ollama_enabled: "{{ ollama_enabled | default(false) }}"
    ollama_bind_address: "{{ ollama_bind_address | default('127.0.0.1') }}"
    ollama_port: "{{ ollama_port | default(11434) }}"
    ollama_data_path: "{{ ollama_data_path | default('/srv/ollama') }}"
    ollama_models_path: "{{ ollama_models_path | default('/srv/ollama/models') }}"
    ollama_memory_max: "{{ ollama_memory_max | default('8G') }}"
    ollama_default_models: "{{ ollama_default_models | default([]) }}"
    ollama_caddy_enabled: "{{ ollama_caddy_enabled | default(false) }}"
    ollama_domain: "{{ ollama_domain | default('') }}"
    ollama_url_prefix: "{{ ollama_url_prefix | default('/ollama') }}"

    # Syncthing external access
    syncthing_domain: "{{ syncthing_domain | default('') }}"

    # AI CLI tool variables
    claude_cli_enabled: "{{ claude_cli_enabled | default(false) }}"
    gemini_cli_enabled: "{{ gemini_cli_enabled | default(false) }}"
    shellgpt_enabled: "{{ shellgpt_enabled | default(false) }}"
    codex_enabled: "{{ codex_enabled | default(false) }}"

    # Cloudflare Tunnel
    cloudflare_tunnel_id: "{{ cloudflare_tunnel_id | default('') }}"
    cloudflare_credentials_file: "{{ cloudflare_credentials_file | default('') }}"
    cloudflare_extra_domains: "{{ cloudflare_extra_domains | default([]) }}"
    cloudflare_ssh_domain: "{{ cloudflare_ssh_domain | default('') }}"

  pre_tasks:
    - name: Ensure en_US.UTF-8 locale is present in locale.gen
      ansible.builtin.lineinfile:
        path: /etc/locale.gen
        regexp: '^#?\s*en_US\.UTF-8\s+UTF-8'
        line: 'en_US.UTF-8 UTF-8'
      register: locale_gen_changed

    - name: Generate locales
      ansible.builtin.command:
        cmd: locale-gen
      when: locale_gen_changed.changed
      changed_when: true

    - name: Set system locale
      ansible.builtin.copy:
        content: "LANG=en_US.UTF-8\n"
        dest: /etc/locale.conf
        mode: '0644'
        force: false

    - name: Verify base server installation
      ansible.builtin.stat:
        path: /usr/local/bin/health-check
      register: health_check
      failed_when: not health_check.stat.exists

    - name: Verify Caddy installation
      ansible.builtin.stat:
        path: /etc/caddy/Caddyfile
      register: caddy_config
      failed_when: not caddy_config.stat.exists

    - name: Create addon directories structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /srv/obsidian
        - /srv/git
        - /srv/backups
        - /etc/caddy/conf.d

    # ── AIDE (intrusion detection) — AUR package ─────────────────────
    - name: Check if AIDE is already installed
      ansible.builtin.command:
        cmd: command -v aide
      register: aide_installed
      changed_when: false
      failed_when: false

    - name: Check for AUR helper
      ansible.builtin.shell: "command -v paru || command -v yay"
      register: aide_aur_helper
      changed_when: false
      failed_when: false
      when: aide_installed.rc != 0

    - name: Install AIDE via AUR helper (as admin user, skip PGP check)
      ansible.builtin.shell: |
        sudo -u admin {{ aide_aur_helper.stdout | trim }} -S --noconfirm --needed --skipreview --nopgpfetch --nosign --mflags="--skippgpcheck" aide
      when: aide_installed.rc != 0 and aide_aur_helper.rc | default(1) == 0
      register: aide_install_result
      failed_when: false

    - name: Show AIDE install result
      ansible.builtin.debug:
        msg: "AIDE install: {{ 'OK' if aide_install_result.rc | default(1) == 0 else aide_install_result.stderr | default('failed') }}"
      when: aide_install_result is defined and aide_install_result is not skipped

    - name: Re-check if AIDE is now installed
      ansible.builtin.command:
        cmd: command -v aide
      register: aide_available
      changed_when: false
      failed_when: false

    - name: Check if AIDE database exists
      ansible.builtin.stat:
        path: /var/lib/aide/aide.db.gz
      register: aide_db
      when: aide_available.rc == 0

    - name: Initialize AIDE database (first deploy only)
      ansible.builtin.command:
        cmd: aide --init
      when: aide_available.rc == 0 and not (aide_db.stat.exists | default(true))
      changed_when: true

    - name: Move new AIDE database into place
      ansible.builtin.copy:
        src: /var/lib/aide/aide.db.new.gz
        dest: /var/lib/aide/aide.db.gz
        remote_src: true
        mode: '0600'
      when: aide_available.rc == 0 and not (aide_db.stat.exists | default(true))

    - name: Create AIDE check service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=AIDE file integrity check

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/aide --check
          Nice=19
          IOSchedulingClass=idle
        dest: /etc/systemd/system/aide-check.service
        mode: '0644'
      when: aide_available.rc == 0

    - name: Create AIDE check timer
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Daily AIDE integrity check

          [Timer]
          OnCalendar=*-*-* 04:00:00
          RandomizedDelaySec=1800
          Persistent=true

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/aide-check.timer
        mode: '0644'
      when: aide_available.rc == 0

    - name: Enable AIDE check timer
      ansible.builtin.systemd:
        name: aide-check.timer
        state: started
        enabled: true
        daemon_reload: true
      when: aide_available.rc == 0

    # ── Journal vacuum ──────────────────────────────────────────────────
    - name: Vacuum systemd journal to 200M
      ansible.builtin.command:
        cmd: journalctl --vacuum-size=200M
      changed_when: true
      failed_when: false

    - name: Set journal max size permanently
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse='
        line: 'SystemMaxUse=200M'
      failed_when: false

    # ── Btrfs snapshots via snapper ─────────────────────────────────────
    - name: Install snapper
      ansible.builtin.pacman:
        name: snapper
        state: present

    - name: Check if snapper root config exists
      ansible.builtin.stat:
        path: /etc/snapper/configs/root
      register: snapper_root_config

    - name: Create snapper config for root filesystem
      ansible.builtin.command:
        cmd: snapper -c root create-config /
      when: not snapper_root_config.stat.exists
      changed_when: true
      register: snapper_config_result
      failed_when: false

    - name: Manually create snapper root config if create-config failed
      ansible.builtin.copy:
        content: |
          SUBVOLUME="/"
          FSTYPE="btrfs"
          ALLOW_USERS=""
          ALLOW_GROUPS=""
          TIMELINE_CREATE="yes"
          TIMELINE_CLEANUP="yes"
          TIMELINE_MIN_AGE="1800"
          TIMELINE_LIMIT_HOURLY="10"
          TIMELINE_LIMIT_DAILY="10"
          TIMELINE_LIMIT_WEEKLY="0"
          TIMELINE_LIMIT_MONTHLY="10"
          TIMELINE_LIMIT_YEARLY="10"
          NUMBER_CLEANUP="yes"
          NUMBER_MIN_AGE="1800"
          NUMBER_LIMIT="50"
          NUMBER_LIMIT_IMPORTANT="10"
        dest: /etc/snapper/configs/root
        mode: '0640'
        force: false
      when: not snapper_root_config.stat.exists

    - name: Ensure root is listed in snapper SNAPPER_CONFIGS
      ansible.builtin.lineinfile:
        path: /etc/conf.d/snapper
        regexp: '^SNAPPER_CONFIGS='
        line: 'SNAPPER_CONFIGS="root"'
        create: true
        mode: '0644'

    - name: Check for existing Btrfs snapshots
      ansible.builtin.shell: snapper -c root list 2>/dev/null | awk 'NR > 2 && NF { c++ } END { print c+0 }'
      register: snapshot_count
      changed_when: false
      failed_when: false

    - name: Create initial Btrfs snapshot
      ansible.builtin.command:
        cmd: snapper -c root create --description "Initial deploy snapshot"
      when: (snapshot_count.stdout | default('0') | int) == 0
      changed_when: true
      register: snapper_create_result
      failed_when: false

    - name: Show snapshot create result
      ansible.builtin.debug:
        msg: "snapper create: rc={{ snapper_create_result.rc | default('skipped') }} {{ snapper_create_result.stderr | default('') }}"
      when: snapper_create_result is not skipped

    # ── Container security policy ───────────────────────────────────────
    - name: Ensure containers config directory exists
      ansible.builtin.file:
        path: /etc/containers
        state: directory
        mode: '0755'

    - name: Harden container security policy (reject unsigned images by default)
      ansible.builtin.copy:
        content: |
          {
            "default": [
              {
                "type": "reject"
              }
            ],
            "transports": {
              "docker": {
                "ghcr.io": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ],
                "docker.io": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ],
                "registry.fedoraproject.org": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ],
                "quay.io": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ]
              },
              "dir": {
                "": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ]
              },
              "oci": {
                "": [
                  {
                    "type": "insecureAcceptAnything"
                  }
                ]
              }
            }
          }
        dest: /etc/containers/policy.json
        mode: '0644'
        force: false

    # ── Basic auth credentials for protected services ──────────────────────
    - name: Check if auth credentials already exist
      ansible.builtin.stat:
        path: /etc/caddy/.auth-credentials
      register: auth_creds_file

    - name: Generate auth password (first deploy only)
      ansible.builtin.set_fact:
        caddy_auth_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
      when: not auth_creds_file.stat.exists

    - name: Generate bcrypt hash for auth password
      ansible.builtin.command:
        cmd: caddy hash-password --plaintext "{{ caddy_auth_password }}"
      register: caddy_hash_result
      changed_when: false
      when: not auth_creds_file.stat.exists

    - name: Store auth credentials
      ansible.builtin.copy:
        content: |
          # Basic auth credentials for protected services
          # Generated on first deploy — do not delete.
          CADDY_AUTH_USER=admin
          CADDY_AUTH_HASH={{ caddy_hash_result.stdout }}
          CADDY_AUTH_PASSWORD={{ caddy_auth_password }}
        dest: /etc/caddy/.auth-credentials
        mode: '0600'
        owner: root
        group: root
      when: not auth_creds_file.stat.exists

    - name: Load existing auth credentials
      ansible.builtin.command:
        cmd: grep -E '^CADDY_AUTH_(USER|HASH)=' /etc/caddy/.auth-credentials
      register: auth_creds_raw
      changed_when: false

    - name: Parse auth credentials
      ansible.builtin.set_fact:
        caddy_auth_user: "{{ auth_creds_raw.stdout | regex_search('CADDY_AUTH_USER=(.+)', '\\1') | first }}"
        caddy_auth_hash: "{{ auth_creds_raw.stdout | regex_search('CADDY_AUTH_HASH=(.+)', '\\1') | first }}"

  roles:
    - role: ../../addons/obsidian-web
      when: obsidian_enabled | bool
      tags: [obsidian, web]

    - role: ../../addons/backblaze-backup
      when: backblaze_enabled | bool
      tags: [backup, backblaze]

    - role: ../../addons/cgit
      when: cgit_enabled | bool
      tags: [cgit, git]

    - role: ../../addons/immich
      when: immich_enabled | bool
      tags: [immich, photos]

    - role: ../../addons/crowdsec
      when: crowdsec_enabled | bool
      tags: [crowdsec, security]

    - role: ../../addons/ollama
      when: ollama_enabled | bool
      tags: [ollama, ai-tools, llm]

    - role: ../../addons/claude-cli
      when: claude_cli_enabled | bool
      tags: [claude, ai-tools]

    - role: ../../addons/gemini-cli
      when: gemini_cli_enabled | bool
      tags: [gemini, ai-tools]

    - role: ../../addons/shellgpt
      when: shellgpt_enabled | bool
      tags: [shellgpt, ai-tools]

    - role: ../../addons/codex
      when: codex_enabled | bool
      tags: [codex, ai-tools]

  post_tasks:
    - name: Validate Caddy configuration
      ansible.builtin.command:
        cmd: caddy validate --config /etc/caddy/Caddyfile
      register: caddy_validate
      changed_when: false
      failed_when: caddy_validate.rc != 0

    - name: Reload Caddy to pick up new configs
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
      when: caddy_validate.rc == 0

    - name: Wait for Caddy to be ready
      ansible.builtin.uri:
        url: http://localhost:2019/config/
        method: GET
        timeout: 10
      register: caddy_admin
      retries: 3
      delay: 2
      until: caddy_admin.status == 200
      failed_when: false

    # ── Cloudflare Tunnel configuration ──────────────────────────────────
    - name: Deploy Cloudflare Tunnel configuration
      ansible.builtin.template:
        src: ../templates/cloudflared-config.yml.j2
        dest: /etc/cloudflared/config.yml
        mode: '0600'
        owner: root
        group: root
      when: cloudflare_tunnel_id | default('') | length > 0
      register: cloudflared_config

    - name: Collect all tunnel hostnames
      ansible.builtin.set_fact:
        cloudflare_all_hostnames: >-
          {{
            (obsidian_sites | default([]) | selectattr('domain', 'defined') | map(attribute='domain') | select('ne', '') | list)
            + (cloudflare_extra_domains | default([]) | select('ne', '') | list)
            + ([immich_domain] if immich_domain | default('') | length > 0 else [])
            + ([syncthing_domain] if syncthing_domain | default('') | length > 0 else [])
            + ([ollama_domain] if ollama_domain | default('') | length > 0 else [])
            + ([cloudflare_ssh_domain] if cloudflare_ssh_domain | default('') | length > 0 else [])
          }}
      when: cloudflare_tunnel_id | default('') | length > 0

    - name: Create DNS records for tunnel hostnames
      ansible.builtin.command:
        cmd: cloudflared tunnel route dns {{ cloudflare_tunnel_id }} {{ item }}
      loop: "{{ cloudflare_all_hostnames | default([]) }}"
      register: dns_route
      changed_when: "'Added' in dns_route.stdout | default('')"
      failed_when: false
      when: cloudflare_tunnel_id | default('') | length > 0

    - name: Restart cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: restarted
      when: cloudflared_config is changed
      failed_when: false

    # ── Reset failed systemd units ──────────────────────────────────────
    # ── Update health-check script from base repo ─────────────────────
    - name: Find base server health-check source
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ playbook_dir }}/../../../../arch-server/src/ansible/roles/base_hardening/files/health-check"
        - "/home/admin/arch-server/src/ansible/roles/base_hardening/files/health-check"
        - "/root/arch-server/src/ansible/roles/base_hardening/files/health-check"
      register: hc_candidates

    - name: Update health-check if source found
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: /usr/local/bin/health-check
        mode: '0755'
      loop: "{{ hc_candidates.results }}"
      when: item.stat.exists | default(false)
      loop_control:
        label: "{{ item.item }}"

    - name: Reset failed state for quartz-build (oneshot — failure is expected on first deploy)
      ansible.builtin.command:
        cmd: systemctl reset-failed quartz-build.service
      changed_when: true
      failed_when: false
      when: obsidian_enabled | bool

    - name: Reset all failed systemd units
      ansible.builtin.command:
        cmd: systemctl reset-failed
      changed_when: true
      failed_when: false

    # ── Ensure CrowdSec is running ──────────────────────────────────────
    - name: Check CrowdSec service status
      ansible.builtin.command:
        cmd: systemctl is-active crowdsec
      register: crowdsec_status
      changed_when: false
      failed_when: false
      when: crowdsec_enabled | bool

    - name: Get CrowdSec failure reason
      ansible.builtin.shell: journalctl -u crowdsec --no-pager -n 20 2>/dev/null || true
      register: crowdsec_journal
      changed_when: false
      when: crowdsec_enabled | bool and crowdsec_status.stdout | default('') != 'active'

    - name: Show CrowdSec failure reason
      ansible.builtin.debug:
        msg: "CrowdSec not running. Journal: {{ crowdsec_journal.stdout | default('no output') }}"
      when: crowdsec_enabled | bool and crowdsec_status.stdout | default('') != 'active'

    - name: Reset CrowdSec failed state
      ansible.builtin.command:
        cmd: systemctl reset-failed crowdsec
      changed_when: true
      failed_when: false
      when: crowdsec_enabled | bool and crowdsec_status.stdout | default('') != 'active'

    - name: Restart CrowdSec if not running
      ansible.builtin.systemd:
        name: crowdsec
        state: restarted
        daemon_reload: true
      when: crowdsec_enabled | bool and crowdsec_status.stdout | default('') != 'active'
      register: crowdsec_restart
      failed_when: false

    - name: Verify CrowdSec is now running
      ansible.builtin.command:
        cmd: systemctl is-active crowdsec
      register: crowdsec_final
      changed_when: false
      failed_when: false
      when: crowdsec_enabled | bool and crowdsec_status.stdout | default('') != 'active'

    - name: Show CrowdSec final status
      ansible.builtin.debug:
        msg: "CrowdSec final status: {{ crowdsec_final.stdout | default('unknown') }}"
      when: crowdsec_enabled | bool and crowdsec_final is defined and crowdsec_final is not skipped

    # ── Final cleanup: reset all failed units and show any remaining ──
    - name: Final reset of all failed systemd units
      ansible.builtin.command:
        cmd: systemctl reset-failed
      changed_when: true
      failed_when: false

    - name: Check for any remaining failed services
      ansible.builtin.shell: systemctl --failed --no-legend --no-pager 2>/dev/null || true
      register: final_failed_services
      changed_when: false

    - name: Show remaining failed services
      ansible.builtin.debug:
        msg: "Failed services after deploy: {{ final_failed_services.stdout | default('none') }}"
      when: final_failed_services.stdout | default('') | length > 0

    - name: Display addon deployment summary
      ansible.builtin.debug:
        msg:
          - "Addon deployment completed successfully"
          - "Obsidian Web: {{ 'ENABLED' if obsidian_enabled | bool else 'disabled' }}"
          - "  - Vault path: {{ obsidian_vault_path }}"
          - "  - URL prefix: {{ obsidian_url_prefix }}"
          - "Backblaze Backup: {{ 'ENABLED' if backblaze_enabled | bool else 'disabled' }}"
          - "  - Bucket: {{ backup_b2_bucket if backup_b2_bucket else 'Not configured' }}"
          - "  - Schedule: {{ backup_schedule }}"
          - "cgit: {{ 'ENABLED' if cgit_enabled | default(false) | bool else 'disabled' }}"
          - "  - Repo path: {{ cgit_repo_path }}"
          - "  - URL prefix: {{ cgit_url_prefix }}"
          - "Immich: {{ 'ENABLED' if immich_enabled | default(false) | bool else 'disabled' }}"
          - "  - Data path: {{ immich_data_path }}"
          - "  - URL prefix: {{ immich_url_prefix }}"
          - "CrowdSec: {{ 'ENABLED' if crowdsec_enabled | default(false) | bool else 'disabled' }}"
          - "  - Data path: {{ crowdsec_data_path }}"
          - "  - URL prefix: {{ crowdsec_url_prefix }}"
          - "  - Agent port: {{ crowdsec_agent_port }}"
          - ""
          - "Ollama: {{ 'ENABLED' if ollama_enabled | default(false) | bool else 'disabled' }}"
          - "  - API: http://{{ ollama_bind_address }}:{{ ollama_port }}"
          - "  - Data: {{ ollama_data_path }}"
          - "  - Memory limit: {{ ollama_memory_max }}"
          - ""
          - "AI CLI Tools:"
          - "  Claude Code: {{ 'ENABLED' if claude_cli_enabled | default(false) | bool else 'disabled' }}"
          - "  Gemini CLI: {{ 'ENABLED' if gemini_cli_enabled | default(false) | bool else 'disabled' }}"
          - "  ShellGPT: {{ 'ENABLED' if shellgpt_enabled | default(false) | bool else 'disabled' }}"
          - "  Codex: {{ 'ENABLED' if codex_enabled | default(false) | bool else 'disabled' }}"

    - name: Display post-deployment instructions
      ansible.builtin.debug:
        msg:
          - "Next steps:"
          - "1. Run health-check: /usr/local/bin/health-check"
          - "{% if obsidian_enabled | bool %}2. Configure Syncthing: http://localhost:8384{% endif %}"
          - "{% if backblaze_enabled | bool %}2. Configure B2: rclone config{% endif %}"
          - "{% if cgit_enabled | bool %}2. Add git repos to {{ cgit_repo_path }}{% endif %}"
          - "{% if immich_enabled | bool %}2. Create Immich admin: immich-create-admin{% endif %}"
          - "{% if crowdsec_enabled | bool %}2. Configure CrowdSec: crowdsec-manage{% endif %}"
